<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-custom-purple { background-color: #A799F2; }
        .bg-custom-blue { background-color: #2421D1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white min-h-screen pb-24">
    <h1 class="px-2 py-1 text-purple-400 font-black ">GameStore</h1>
    <section>
        <div id="search" class="pt-19">
            <input type="text" id="searchinput" placeholder="Search...."  class="w-full custom-purple text-white placeholder-indigo-100 bg-purple-600 rounded-2xl py-4 px-6 outline-none shadow-lg">
           
        </div>
    </section>
    <section>
         <div class="flex gap-4 mb-12 overflow-x-auto no-scrollbar sm:justify-center mt-20">
            <button class="shrink-0 bg-custom-blue text-white px-10 py-2 rounded-2xl font-bold shadow-md uppercase">ALL</button>
            <button class="shrink-0 bg-custom-purple bg-opacity-70 text-white px-10 py-2 rounded-2xl font-bold uppercase">Action</button>
            <button class="shrink-0 bg-custom-purple bg-opacity-70 text-white px-10 py-2 rounded-2xl font-bold uppercase">RPG</button>
            <button class="shrink-0 bg-custom-purple bg-opacity-70 text-white px-10 py-2 rounded-2xl font-bold uppercase">FPS</button>
        </div>
    </section>
    

    
    
</body>
</html>
