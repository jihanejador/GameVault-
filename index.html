<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameStore Responsive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-custom-purple {
            background-color: #A799F2;
        }

        .bg-custom-blue {
            background-color: #2421D1;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen font-sans pb-10">

    <div class="max-w-6xl mx-auto px-4 md:px-8">

        <header class="flex justify-between items-center py-8">
            <h1 class="text-blue-700 font-black text-3xl tracking-tighter">
                Game<span class="text-blue-300 font-normal">Store</span>
            </h1>
            <button class="text-indigo-200 hover:text-indigo-400 transition">
                <svg class="w-12 h-12" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z" />
                </svg>
            </button>
        </header>

        <div class="relative mb-10 max-w-xl mx-auto">
            <input type="text" placeholder="search......." id="searchInput"
                class="w-full bg-custom-purple rounded-2xl py-4 px-8 text-white placeholder-indigo-100 outline-none shadow-lg text-lg">

        </div>

        <div class="flex gap-4 mb-12 overflow-x-auto no-scrollbar sm:justify-center">
            <button
                class="category-btn shrink-0 bg-custom-blue text-white px-10 py-2 rounded-2xl font-bold shadow-md uppercase"
                data-category="all">ALL</button>
            <button
                class="category-btn shrink-0 bg-custom-purple bg-opacity-70 text-white px-10 py-2 rounded-2xl font-bold uppercase"
                data-category="Action">Action</button>
            <button
                class="category-btn shrink-0 bg-custom-purple bg-opacity-70 text-white px-10 py-2 rounded-2xl font-bold uppercase"
                data-category="RPG">RPG</button>
            <button
                class="category-btn shrink-0 bg-custom-purple bg-opacity-70 text-white px-10 py-2 rounded-2xl font-bold uppercase"
                data-category="FPS">FPS</button>
            <button
                class="category-btn shrink-0 bg-custom-purple bg-opacity-70 text-white px-10 py-2 rounded-2xl font-bold uppercase"
                data-category="Sport">Sport</button>
        </div>

        <main id="game-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10">
        </main>
        <div id="cart-page" class="hidden fixed inset-0 bg-white z-50 p-8 overflow-y-auto">
            <input id="cart" placeholder="Code Promo"></input>
            <button id="btn-color">Appliquer</button>
            <div class="max-w-2xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <button id="closeCart" class="text-3xl font-bold">&larr;</button>
                    <h1 class="text-blue-700 font-black text-2xl">Game<span
                            class="text-blue-300 font-normal">Store</span></h1>
                </div>

                <div class="relative mb-8">
                    <input type="text" placeholder="search......."
                        class="w-full bg-indigo-100 rounded-2xl py-3 px-6 outline-none text-gray-500">
                    <span class="absolute right-5 top-3 opacity-30"></span>
                </div>

                <h2 class="text-2xl font-black mb-6 italic italic uppercase">Votre Panier</h2>

                <div id="cart-items" class="space-y-6">
                </div>

                <div class="fixed bottom-0 left-0 right-0 p-6 bg-indigo-300 rounded-t-[2rem]">
                    <div class="max-w-2xl mx-auto flex justify-between items-center">
                        <h3 class="text-white text-xl font-bold italic">Total : $ <span id="total-price">0.00</span>
                        </h3>
                        <button id="checkoutBtn"
                            class="bg-blue-800 text-white px-8 py-2 rounded-full font-bold uppercase text-xs">Commander</button>
                    </div>
                </div>
            </div>
        </div>


    </div>


    <script src="script.js"></script>
</body>

</html>
